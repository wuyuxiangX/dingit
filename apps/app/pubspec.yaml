name: dingit_app
description: Dingit - Interactive notification system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  web_socket_channel: ^3.0.0
  dingit_shared:
    path: ../../packages/dingit_shared
  http: ^1.3.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.4
  package_info_plus: ^8.1.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app-icon.png"
  adaptive_icon_background: "#1a1a1a"
  adaptive_icon_foreground: "assets/app-icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - google_fonts/
