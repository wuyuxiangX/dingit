services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dingit
      POSTGRES_USER: dingit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dingit"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    image: ghcr.io/wuyuxiangx/dingit:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://dingit:${POSTGRES_PASSWORD}@postgres:5432/dingit?sslmode=disable
      DINGIT_API_KEY: ${DINGIT_API_KEY:-}
      # Push notifications (optional)
      APNS_KEY_FILE: ${APNS_KEY_FILE:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_BUNDLE_ID: ${APNS_BUNDLE_ID:-}
      APNS_ENV: ${APNS_ENV:-}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - ./secrets:/secrets:ro

volumes:
  pgdata:
