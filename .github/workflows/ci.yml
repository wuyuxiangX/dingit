name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod

      - run: go vet ./...

      - run: go build -o /dev/null .

      - run: go test ./... -v
        if: hashFiles('apps/server/**/*_test.go') != ''

  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/cli/go.mod

      - run: go vet ./...

      - run: go build -o /dev/null .

      - run: go test ./... -v
        if: hashFiles('apps/cli/**/*_test.go') != ''

  app:
    name: App (Flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Generate freezed/json_serializable code for shared package
      - run: dart pub get
        working-directory: packages/dingit_shared

      - run: dart run build_runner build --delete-conflicting-outputs
        working-directory: packages/dingit_shared

      - run: flutter pub get
        working-directory: apps/app

      - run: flutter analyze
        working-directory: apps/app

      - run: flutter test
        if: hashFiles('apps/app/test/**') != ''
        working-directory: apps/app

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
