name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    # Postgres service container for integration tests. Using a
    # GitHub Actions service here (instead of testcontainers-go) avoids
    # Docker-in-Docker overhead and the occasional DIND lock-ups we've
    # seen in CI. The container is fresh per job so tests get a clean
    # slate; our test helpers then rely on goose migrations + TRUNCATE
    # for isolation between individual test functions.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: dingit
          POSTGRES_PASSWORD: testpw
          POSTGRES_DB: dingit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      POSTGRES_TEST_URL: postgres://dingit:testpw@localhost:5432/dingit_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/server/go.mod

      - run: go vet ./...

      - run: go build -o /dev/null .

      - name: Check swagger docs are up to date
        run: |
          go install github.com/swaggo/swag/cmd/swag@v1.16.6
          swag init --output internal/docs --parseDependency --parseInternal
          git diff --exit-code internal/docs/ || (echo "Swagger docs are out of date. Run 'make swagger' and commit." && exit 1)

      - run: go test ./... -v
        if: hashFiles('apps/server/**/*_test.go') != ''

  cli:
    name: CLI (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/cli/go.mod

      - run: go vet ./...

      - run: go build -o /dev/null .

      - run: go test ./... -v
        if: hashFiles('apps/cli/**/*_test.go') != ''

  app:
    name: App (Flutter)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Generate freezed/json_serializable code for shared package
      - run: dart pub get
        working-directory: packages/dingit_shared

      - run: dart run build_runner build --delete-conflicting-outputs
        working-directory: packages/dingit_shared

      - run: flutter pub get
        working-directory: apps/app

      - run: flutter analyze --no-fatal-infos
        working-directory: apps/app

      - run: flutter test
        if: hashFiles('apps/app/test/**') != ''
        working-directory: apps/app

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: ./apps/server
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
